<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="leftGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1B3D6A"/>
      <stop offset="100%" stop-color="#34CDB5"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5B535"/>
      <stop offset="100%" stop-color="#F09212"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#CC2020"/>
      <stop offset="100%" stop-color="#A80F0F"/>
    </linearGradient>
  </defs>
  <!-- Left tall pill -->
  <rect x="0" y="0" width="47" height="100" rx="9" fill="url(#leftGrad)"/>
  <!-- Bottom-right red (rendered first so orange sits on top) -->
  <rect x="53" y="50" width="47" height="50" rx="9" fill="url(#redGrad)"/>
  <!-- Top-right orange (rendered on top, overlaps red by 1px at junction) -->
  <rect x="53" y="0" width="47" height="51" rx="9" fill="url(#orangeGrad)"/>
</svg>
